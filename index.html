<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Choperia Jacques</title>
<meta name="theme-color" content="#6B1D2F" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<link rel="icon" href="/icon-192.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --vinho:#6B1D2F; --vinhoEsc:#551625; --ouro:#D4AF37; --ouroEsc:#B8942A;
    --fundo:#F8F9FA; --texto:#2B2222;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--fundo);color:var(--texto);
    font-family:Arial,Helvetica,sans-serif}
  .wrap{max-width:480px;margin:0 auto;position:relative;padding-bottom:80px;min-height:100vh}
  header{background:var(--vinho);padding:24px 20px;display:flex;justify-content:center}
  header img{width:172px;height:auto}
  .adminbar{display:flex;align-items:center;justify-content:space-between;
    background:var(--ouro);color:var(--vinhoEsc);padding:8px 16px;font-size:12px;font-weight:700}
  .adminbar button{background:none;border:none;color:var(--vinhoEsc);text-decoration:underline;
    font-weight:700;cursor:pointer;font-size:12px}
  nav{position:sticky;top:0;z-index:20;display:flex;background:var(--vinho);
    box-shadow:0 2px 8px rgba(0,0,0,.12)}
  nav button{flex:1;background:none;border:none;padding:12px 4px;cursor:pointer;
    color:rgba(255,255,255,.65);border-bottom:3px solid transparent;
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  nav button.ativo{color:var(--ouro);border-bottom-color:var(--ouro)}
  .busca{padding:16px 16px 0}
  .busca div{display:flex;align-items:center;gap:8px;background:#fff;border-radius:8px;
    padding:8px 12px;border:1px solid rgba(107,29,47,.15)}
  .busca input{flex:1;border:none;outline:none;font-size:14px;color:var(--texto);background:none}
  main{padding:16px}
  .aviso{background:rgba(107,29,47,.06);border:1px dashed rgba(107,29,47,.3);
    color:var(--vinho);border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:20px}
  .secTitle{display:flex;align-items:center;gap:12px;margin:24px 0 12px}
  .secTitle h2{margin:0;font-family:Georgia,serif;color:var(--vinho);font-size:18px}
  .secTitle .line{flex:1;height:1px;background:rgba(212,175,55,.5)}
  .card{background:#fff;border:1px solid rgba(107,29,47,.10);border-radius:12px;
    overflow:hidden;box-shadow:0 1px 2px rgba(43,34,34,.04);margin-bottom:12px}
  .card.off{opacity:.6;border-color:#E5E0DE}
  .card .foto{width:100%;aspect-ratio:4/3;background:#F1ECEA}
  .card .foto img{width:100%;height:100%;object-fit:cover;display:block}
  .card .body{padding:16px}
  .card .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .card h3{margin:0;font-size:15px;font-weight:600;line-height:1.3}
  .badge{margin-left:8px;font-size:10px;font-weight:700;text-transform:uppercase;
    background:#EFE9E7;color:#8A7F7B;padding:2px 6px;border-radius:4px}
  .preco{white-space:nowrap;font-weight:700;font-size:15px;color:var(--ouroEsc)}
  .desc{font-size:13px;color:#7A716D;margin:4px 0 0}
  .harm{margin-top:10px;display:flex;gap:8px;background:rgba(212,175,55,.10);
    border:1px solid rgba(212,175,55,.35);border-radius:8px;padding:8px 10px;font-size:12px;line-height:1.35}
  .harm b{color:var(--vinho)}
  .harm .ico{color:var(--ouroEsc);flex:none}
  .adminBtns{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
  .adminBtns button{font-size:12px;font-weight:700;border:none;border-radius:6px;
    padding:5px 10px;cursor:pointer}
  .b-vinho{background:#F1EBE9;color:var(--vinho)}
  .b-verde{background:#EAF6EC;color:#1E7A3B}
  .b-verm{background:#FBECEC;color:#9A2B2B}
  footer{text-align:center;padding:40px 16px 24px;font-size:12px;color:#B4A9A4}
  footer .adm{cursor:default;user-select:none}
  .msg{text-align:center;color:#A99B96;font-size:14px;padding:40px 0}
  .overlay{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;
    background:rgba(43,34,34,.45)}
  .overlay .box{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:300px;margin:0 16px}
  .overlay h3{margin:0 0 12px;color:var(--vinho);display:flex;align-items:center;gap:8px;font-size:16px}
  .overlay input{width:100%;font-size:14px;border:1px solid rgba(107,29,47,.25);border-radius:8px;
    padding:8px 12px;margin-bottom:8px;outline:none}
  .overlay .erro{color:#D9534F;font-size:12px;margin:0 0 8px}
  .overlay .entrar{width:100%;padding:10px;border:none;border-radius:8px;background:var(--vinho);
    color:#fff;font-weight:700;font-size:14px;cursor:pointer}
  .toast{background:#fff;color:var(--vinho);font-weight:700;font-size:14px;padding:10px 16px;border-radius:8px}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header><img src="/logo.png" alt="Choperia Jacques" /></header>

  <div id="adminbar" class="adminbar hidden">
    <span>🔒 Modo administrador ativo</span>
    <button id="btnSair">Sair</button>
  </div>

  <nav id="nav"></nav>

  <div class="busca">
    <div>
      <span style="color:#A99B96">🔍</span>
      <input id="busca" type="text" placeholder="Buscar no cardápio..." />
    </div>
  </div>

  <main id="lista"><p class="msg">Carregando cardápio...</p></main>

  <footer>
    © Choperia Jacques • <span id="adm" class="adm">Desde 2013</span>
  </footer>
</div>

<input id="inputFoto" type="file" accept="image/*" class="hidden" />
<div id="salvando" class="overlay hidden"><div class="toast">Salvando foto...</div></div>

<div id="loginModal" class="overlay hidden">
  <div class="box">
    <h3>🔒 Acesso do Gerente</h3>
    <input id="email" type="email" placeholder="E-mail" />
    <input id="senha" type="password" placeholder="Senha" />
    <p id="loginErro" class="erro hidden"></p>
    <button id="btnEntrar" class="entrar">Entrar</button>
  </div>
</div>

<script>
const SUPA_URL = "https://txcyihsuchnjkdjgzpxa.supabase.co";
const SUPA_KEY = "sb_publishable_eQZs-WjIhIU-MsddYIFoBg_D3vpZvRu";
const SB = window.supabase.createClient(SUPA_URL, SUPA_KEY);

const TABS = ["Cardápio", "Vinhos", "Drinks & Destilados"];
const brl = (n) => "R$ " + Number(n).toLocaleString("pt-BR", {minimumFractionDigits:2, maximumFractionDigits:2});
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

let produtos = [], tab = "Cardápio", busca = "", sessao = null, fotoAlvo = null;

const el = (id) => document.getElementById(id);

// ---------- Carregar dados ----------
async function carregar(){
  const { data, error } = await SB.from("produtos").select("*").order("ordem", {ascending:true});
  if(error){ el("lista").innerHTML = '<p class="msg" style="color:#9A2B2B">Não foi possível carregar o cardápio.</p>'; return; }
  produtos = data || [];
  render();
}

// ---------- Render ----------
function render(){
  // abas
  el("nav").innerHTML = TABS.map(t =>
    `<button data-tab="${esc(t)}" class="${t===tab?'ativo':''}">${esc(t)}</button>`).join("");

  const q = busca.trim().toLowerCase();
  const daAba = produtos.filter(p => p.aba === tab &&
    (!q || p.nome.toLowerCase().includes(q) || (p.descricao||"").toLowerCase().includes(q)));

  let html = "";
  if(tab === "Vinhos"){
    html += '<div class="aviso">Carta de vinhos (tintos, brancos e rosés) em breve. Por enquanto, nossos espumantes:</div>';
  }
  if(daAba.length === 0){
    html += '<p class="msg">Nenhum item encontrado.</p>';
  } else {
    let secaoAtual = null;
    for(const p of daAba){
      if(p.secao !== secaoAtual){
        secaoAtual = p.secao;
        html += `<div class="secTitle"><h2>${esc(secaoAtual)}</h2><div class="line"></div></div>`;
      }
      html += cardHTML(p);
    }
  }
  el("lista").innerHTML = html;
}

function cardHTML(p){
  const off = !p.disponivel;
  const admin = !!sessao;
  let c = `<div class="card ${off?'off':''}" data-id="${p.id}">`;
  if(p.foto_url) c += `<div class="foto"><img src="${esc(p.foto_url)}" alt="${esc(p.nome)}"></div>`;
  c += `<div class="body"><div class="top">
      <h3>${esc(p.nome)}${off?'<span class="badge">Esgotado</span>':''}</h3>
      <span class="preco">${brl(p.preco)}</span></div>`;
  if(p.descricao) c += `<p class="desc">${esc(p.descricao)}</p>`;
  if(p.harmonizacao) c += `<div class="harm"><span class="ico">✨</span>
      <span><b>Dica do Chef:</b> ${esc(p.harmonizacao)}</span></div>`;
  if(admin){
    c += `<div class="adminBtns">
      <button class="${off?'b-verde':'b-verm'}" data-acao="toggle">${off?'Marcar disponível':'Marcar esgotado'}</button>
      <button class="b-vinho" data-acao="preco">Editar preço</button>
      <button class="b-vinho" data-acao="foto">${p.foto_url?'Trocar foto':'Adicionar foto'}</button>
      ${p.foto_url?'<button class="b-verm" data-acao="removerfoto">Remover foto</button>':''}
    </div>`;
  }
  c += `</div></div>`;
  return c;
}

// ---------- Ações admin ----------
async function atualizar(id, campos){
  const alvo = produtos.find(p => p.id === id);
  if(alvo) Object.assign(alvo, campos);
  render();
  const { error } = await SB.from("produtos").update(campos).eq("id", id);
  if(error){ alert("Não consegui salvar. Verifique sua conexão/login."); carregar(); }
}
function toggleDisp(p){ atualizar(p.id, {disponivel: !p.disponivel}); }
function editarPreco(p){
  const v = prompt("Novo preço (somente números). Ex: 42.50", String(p.preco));
  if(v == null) return;
  const num = parseFloat(v.replace(",", "."));
  if(isNaN(num) || num < 0) return;
  atualizar(p.id, {preco: num});
}
function removerFoto(p){ atualizar(p.id, {foto_url: null}); }

function comprimir(file, maxW=900, q=0.82){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const escala = Math.min(1, maxW/img.width);
        const w = Math.round(img.width*escala), h = Math.round(img.height*escala);
        const cv = document.createElement("canvas"); cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        cv.toBlob(b => b?resolve(b):reject(new Error("blob")), "image/jpeg", q);
      };
      img.onerror = reject; img.src = e.target.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}
async function enviarFoto(file, p){
  el("salvando").classList.remove("hidden");
  try{
    const blob = await comprimir(file);
    const path = p.id + "-" + Date.now() + ".jpg";
    const up = await SB.storage.from("fotos-produtos").upload(path, blob, {contentType:"image/jpeg", upsert:true});
    if(up.error) throw up.error;
    const { data } = SB.storage.from("fotos-produtos").getPublicUrl(path);
    await atualizar(p.id, {foto_url: data.publicUrl});
  }catch(err){ console.error(err); alert("Não consegui enviar a foto. Tente novamente."); }
  finally{ el("salvando").classList.add("hidden"); fotoAlvo = null; }
}

// ---------- Eventos ----------
el("nav").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-tab]");
  if(!b) return;
  tab = b.dataset.tab; busca = ""; el("busca").value = ""; render();
});
el("busca").addEventListener("input", (e) => { busca = e.target.value; render(); });

el("lista").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-acao]");
  if(!btn) return;
  const card = e.target.closest(".card");
  const p = produtos.find(x => x.id === card.dataset.id);
  if(!p) return;
  const acao = btn.dataset.acao;
  if(acao === "toggle") toggleDisp(p);
  else if(acao === "preco") editarPreco(p);
  else if(acao === "removerfoto") removerFoto(p);
  else if(acao === "foto"){ fotoAlvo = p; el("inputFoto").value = ""; el("inputFoto").click(); }
});
el("inputFoto").addEventListener("change", (e) => {
  const file = e.target.files && e.target.files[0];
  if(file && fotoAlvo) enviarFoto(file, fotoAlvo);
});

// Acesso discreto (toque longo / duplo clique em "Desde 2013")
let pressTimer = null;
const abrirLogin = () => el("loginModal").classList.remove("hidden");
el("adm").addEventListener("mousedown", () => { pressTimer = setTimeout(abrirLogin, 650); });
el("adm").addEventListener("mouseup", () => clearTimeout(pressTimer));
el("adm").addEventListener("mouseleave", () => clearTimeout(pressTimer));
el("adm").addEventListener("touchstart", () => { pressTimer = setTimeout(abrirLogin, 650); });
el("adm").addEventListener("touchend", () => clearTimeout(pressTimer));
el("adm").addEventListener("dblclick", abrirLogin);

el("btnEntrar").addEventListener("click", entrar);
el("senha").addEventListener("keydown", (e) => { if(e.key === "Enter") entrar(); });
async function entrar(){
  el("loginErro").classList.add("hidden");
  const { error } = await SB.auth.signInWithPassword({
    email: el("email").value.trim(), password: el("senha").value });
  if(error){ el("loginErro").textContent = "E-mail ou senha incorretos."; el("loginErro").classList.remove("hidden"); }
  else{ el("loginModal").classList.add("hidden"); el("email").value=""; el("senha").value=""; }
}
el("btnSair").addEventListener("click", async () => { await SB.auth.signOut(); });
el("loginModal").addEventListener("click", (e) => { if(e.target === el("loginModal")) el("loginModal").classList.add("hidden"); });

SB.auth.onAuthStateChange((_e, s) => {
  sessao = s;
  el("adminbar").classList.toggle("hidden", !s);
  render();
});

// ---------- Início ----------
SB.auth.getSession().then(({data}) => { sessao = data.session; el("adminbar").classList.toggle("hidden", !sessao); });
carregar();
if("serviceWorker" in navigator){ window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(()=>{})); }
</script>
</body>
</html>
